version: '3.8'

networks:
  monitoring-net:
    driver: bridge

volumes:
  pgdata:
  prometheus_data:
  tempo_data:
  loki_data:
  grafana_data:

services:
  postgres:
    image: postgres:15-alpine
    container_name: taskflow-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-taskflow}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - monitoring-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-taskflow}"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: ./taskflow
      dockerfile: Dockerfile
    container_name: taskflow-app
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-taskflow}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      JWT_SECRET: ${JWT_SECRET:-404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-586E3272357538782F413F4428472B4B6250645367566B5970404E635266556A}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4318/v1/traces
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      tempo:
        condition: service_started
    networks:
      - monitoring-net

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: taskflow-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    networks:
      - monitoring-net

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: taskflow-alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
    ports:
      - "9093:9093"
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    networks:
      - monitoring-net

  tempo:
    image: grafana/tempo:2.4.1
    container_name: taskflow-tempo
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    ports:
      - "3200:3200"   # Tempo HTTP
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    volumes:
      - ./monitoring/tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo_data:/var/tempo
    networks:
      - monitoring-net

  loki:
    image: grafana/loki:3.0.0
    container_name: taskflow-loki
    command: ["-config.file=/etc/loki/loki-config.yaml"]
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - loki_data:/tmp/loki
    networks:
      - monitoring-net

  alloy:
    image: grafana/alloy:v1.0.0
    container_name: taskflow-alloy
    command: ["run", "--server.http.listen-addr=0.0.0.0:12345", "/etc/alloy/alloy.river"]
    volumes:
      - ./monitoring/alloy/alloy.river:/etc/alloy/alloy.river:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - monitoring-net
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:10.4.2
    container_name: taskflow-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    ports:
      - "3000:3000"
    volumes:
      - ./monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/dashboards/json:/etc/grafana/provisioning/dashboards/json:ro
      - grafana_data:/var/lib/grafana
    networks:
      - monitoring-net
    depends_on:
      - prometheus
      - tempo
      - loki
