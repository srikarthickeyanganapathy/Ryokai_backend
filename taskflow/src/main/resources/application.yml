spring:
  application:
    name: taskflow
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    driver-class-name: org.postgresql.Driver
    
  jpa:
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  lifecycle:
    timeout-per-shutdown-phase: 30s

  messaging:
    stomp:
  task:
    scheduling:
      pool:
        size: 2

jwt:
  secret: ${JWT_SECRET}
  refreshSecret: ${JWT_REFRESH_SECRET}
  expirationMs: 900000
  refreshExpirationMs: 604800000

server:
  shutdown: graceful
  compression:
    enabled: true

app:
  notifications:
    enabled: true
  reminders:
    timezone: Asia/Kolkata
    due-soon-cron: "0 0 8 * * ?"
    overdue-cron: "0 0 9 * * ?"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
    prometheus:
      enabled: true
  metrics:
    tags:
      application: ryokai
    distribution:
      percentiles-histogram:
        "http.server.requests": true
