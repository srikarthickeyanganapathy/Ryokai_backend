spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

jwt:
  secret: ${JWT_SECRET}
  refreshSecret: ${JWT_REFRESH_SECRET}


  frontend-url: ${APP_FRONTEND_URL:https://taskflow.example.com}
  email:
    from: ${APP_EMAIL_FROM:noreply@taskflow.example.com}
    smtp-host: ${APP_EMAIL_SMTP_HOST:}
    smtp-port: ${APP_EMAIL_SMTP_PORT:587}
