<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Verify your email</title>
</head>
<body style="font-family: Arial, sans-serif; color: #333333; line-height: 1.6; margin: 0; padding: 20px;">
    <div style="max-width: 600px; margin: 0 auto; background-color: #ffffff; padding: 30px; border-radius: 8px; border: 1px solid #eeeeee;">
        <h2 style="color: #2c3e50; margin-top: 0;">Welcome to TaskFlow, <span th:text="${userName}">User</span>!</h2>
        <p>Thanks for signing up. Please verify your email address to secure your account.</p>
        <div style="text-align: center; margin: 30px 0;">
            <a th:href="${verifyLink}" style="background-color: #0ea5e9; color: #ffffff; padding: 12px 24px; text-decoration: none; border-radius: 6px; font-weight: bold; display: inline-block;">Verify Email</a>
        </div>
        <p>Or copy and paste this link into your browser:</p>
        <p style="word-break: break-all; color: #666666;"><a th:href="${verifyLink}" th:text="${verifyLink}"></a></p>
        <hr style="border: none; border-top: 1px solid #eeeeee; margin: 30px 0;">
        <p style="font-size: 12px; color: #999999;">If you didn't create an account, you can safely ignore this email.</p>
    </div>
</body>
</html>
