<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Task Review Status</title>
</head>
<body style="font-family: Arial, sans-serif; line-height: 1.6; color: #333;">
    <div style="max-width: 600px; margin: 0 auto; padding: 20px; border: 1px solid #ddd; border-radius: 5px;">
        <h2 style="color: #2c3e50;">Task Review Update</h2>
        <p>Hello <span th:text="${assigneeName}">User</span>,</p>
        <p><span th:text="${reviewerName}">Reviewer</span> has reviewed your task.</p>
        <p><strong>Task:</strong> <span th:text="${taskTitle}">Task Title</span></p>
        <p><strong>Status:</strong> <span th:text="${status}" th:style="${status == 'APPROVED' ? 'color: green; font-weight: bold;' : 'color: red; font-weight: bold;'}">STATUS</span></p>
        
        <div th:if="${reason != null}">
            <p><strong>Reason:</strong></p>
            <blockquote style="border-left: 4px solid #e74c3c; margin: 0; padding-left: 10px; color: #666;" th:text="${reason}"></blockquote>
        </div>

        <div style="text-align: center; margin: 30px 0;">
            <a th:href="${taskUrl}" style="background-color: #3498db; color: white; padding: 12px 25px; text-decoration: none; border-radius: 4px; display: inline-block; font-weight: bold;">View Task</a>
        </div>
        <hr style="border: none; border-top: 1px solid #eee; margin: 20px 0;">
        <p style="font-size: 12px; color: #7f8c8d; text-align: center;">TaskFlow Team</p>
    </div>
</body>
</html>
