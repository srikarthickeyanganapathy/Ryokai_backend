<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Leave Request Submitted</title>
</head>
<body style="font-family: Arial, sans-serif; line-height: 1.6; color: #333;">
    <div style="max-width: 600px; margin: 0 auto; padding: 20px; border: 1px solid #ddd; border-radius: 5px;">
        <h2 style="color: #2c3e50;">New Leave Request</h2>
        <p>Hello <span th:text="${adminName}">Admin</span>,</p>
        <p><span th:text="${userName}">User</span> has submitted a request to leave <span th:text="${orgName}">the organization</span>.</p>
        <div style="text-align: center; margin: 30px 0;">
            <a th:href="${requestUrl}" style="background-color: #e74c3c; color: white; padding: 12px 25px; text-decoration: none; border-radius: 4px; display: inline-block; font-weight: bold;">Review Request</a>
        </div>
        <hr style="border: none; border-top: 1px solid #eee; margin: 20px 0;">
        <p style="font-size: 12px; color: #7f8c8d; text-align: center;">TaskFlow Team</p>
    </div>
</body>
</html>
