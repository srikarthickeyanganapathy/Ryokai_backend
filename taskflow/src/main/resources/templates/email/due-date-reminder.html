<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Task Due Soon</title>
</head>
<body style="font-family: Arial, sans-serif; line-height: 1.6; color: #333;">
    <div style="max-width: 600px; margin: 0 auto; padding: 20px; border: 1px solid #ddd; border-radius: 5px;">
        <h2 style="color: #e67e22;">Task Due Soon Reminder</h2>
        <p>Hello <span th:text="${assigneeName}">User</span>,</p>
        <p>This is a reminder that one of your tasks is due in <strong th:text="${hoursUntilDue}"></strong> hours.</p>
        <p><strong>Task:</strong> <span th:text="${taskTitle}">Task Title</span></p>
        <p><strong>Due Date:</strong> <span th:text="${#temporals.format(dueDate, 'yyyy-MM-dd HH:mm:ss')}"></span></p>
        
        <div style="text-align: center; margin: 30px 0;">
            <a th:href="${taskUrl}" style="background-color: #e67e22; color: white; padding: 12px 25px; text-decoration: none; border-radius: 4px; display: inline-block; font-weight: bold;">View Task</a>
        </div>
        <hr style="border: none; border-top: 1px solid #eee; margin: 20px 0;">
        <p style="font-size: 12px; color: #7f8c8d; text-align: center;">TaskFlow Team</p>
    </div>
</body>
</html>
