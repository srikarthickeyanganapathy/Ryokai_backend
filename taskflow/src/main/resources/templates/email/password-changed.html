<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Password Changed</title>
</head>
<body style="font-family: Arial, sans-serif; line-height: 1.6; color: #333;">
    <div style="max-width: 600px; margin: 0 auto; padding: 20px; border: 1px solid #ddd; border-radius: 5px;">
        <h2 style="color: #2c3e50;">Password Changed Successfully</h2>
        <p>Hello <span th:text="${userName}">User</span>,</p>
        <p>Your TaskFlow account password was recently changed.</p>
        <p><strong>Time:</strong> <span th:text="${#temporals.format(timestamp, 'yyyy-MM-dd HH:mm:ss')}"></span></p>
        <p th:if="${ipAddress != null}"><strong>IP Address:</strong> <span th:text="${ipAddress}"></span></p>
        <p style="color: #e74c3c;">If you did not make this change, please contact your administrator immediately.</p>
        <hr style="border: none; border-top: 1px solid #eee; margin: 20px 0;">
        <p style="font-size: 12px; color: #7f8c8d; text-align: center;">TaskFlow Team</p>
    </div>
</body>
</html>
